spring:
  application:
    name: Blog_App
  datasource:
    url: ${DATABASE_URL}
    username: ${PGUSER}
    password: ${PGPASSWORD}
    hikari:
      auto-commit: false
      connection-timeout: 20000
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 60000
      max-lifetime: 1800000
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    user: ${PGUSER}
    password: ${PGPASSWORD}
    baseline-version: 1
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
  data:
    redis:
      host: ${REDISHOST}
      port: ${REDISPORT}
      password: ${REDISPASSWORD}
  cache:
    type: redis
  ai:
    openai:
      api-key: ${AI_KEY}
      chat:
        base-url: https://generativelanguage.googleapis.com
        options:
          model: gemini-2.5-flash-lite
        completions-path: /v1beta/openai/chat/completions

jwt:
  secret: ${SECRET_KEY}
  expiration: 604800000

cloudinary:
  api-key: ${CLOUDINARY_KEY}
  api-secret: ${CLOUDINARY_SECRET}

logging:
  level:
    org.springframework.cache: TRACE
    org.springframework.data.redis: DEBUG
    org.springframework.security: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus

cache:
  ttl-seconds: ${CACHE_TTL_SECONDS:300}