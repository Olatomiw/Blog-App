spring:
  application:
    name: Blog_App
  datasource:
    url: jdbc:postgresql://localhost:5432/Blog_App
    username: postgres
    password: ${DB_PASSWORD}
    hikari:
      auto-commit: false
      connection-timeout: 20000
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 60000
      max-lifetime: 1800000
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    user: postgres
    password: ${DB_PASSWORD}
    baseline-version: 1
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
  data:
    redis:
      host: localhost
      port: 6379
  cache:
    type: redis
  mail:
    host: smtp.gmail.com
    port: 465
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          ssl.enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
  ai:
    openai:
      api-key: ${AI_KEY}
      chat:
        base-url: https://generativelanguage.googleapis.com
        options:
          model: gemini-2.5-flash-lite
        completions-path: /v1beta/openai/chat/completions

jwt:
  expiration: 604800000

cloudinary:
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_SECRET}

logging:
  level:
    org.springframework.cache: TRACE
    org.springframework.data.redis: DEBUG
    org.springframework.security: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus

cache:
  ttl-seconds: ${CACHE_TTL_SECONDS:300}