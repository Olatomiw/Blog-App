spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/blog_test}
    username: ${PGUSER:postgres}
    password: ${PGPASSWORD:postgres}
    hikari:
      maximum-pool-size: 3
      minimum-idle: 1

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    user: ${PGUSER:postgres}
    password: ${PGPASSWORD:postgres}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  cache:
    type: redis

  mail:
    host: localhost
    port: 25
    username: test@test.com
    password: test

  ai:
    openai:
      api-key: test-key

cloudinary:
  api-key: test-key
  api-secret: test-secret

cache:
  ttl-seconds: 60

jwt:
  secret: dGVzdC1zZWNyZXQta2V5LXRoYXQtaXMtbG9uZy1lbm91Z2gtZm9yLWhzMjU2
  expiration: 604800000

logging:
  level:
    root: WARN
    org.springframework.cache: TRACE