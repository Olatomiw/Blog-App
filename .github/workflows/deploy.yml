name: CI/CD → Railway

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        run: ./mvnw test

  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy
        run: railway up --service ${{ secrets.RAILWAY_SERVICE_NAME }} --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}




## 6. GitHub Secrets

#In your GitHub repo → **Settings → Secrets and variables → Actions**, add:
#
#  | Secret | Where to get it |
#  |---|---|
#  | `RAILWAY_TOKEN` | Railway Dashboard → Account Settings → Tokens |
#  | `RAILWAY_SERVICE_NAME` | The name of your app service on Railway |
#
#---
#
### Flow Summary
#  ```
#  Push to main
#  ↓
#GitHub Actions: build + test
#  ↓ (if tests pass)
#  railway up → builds Docker image → deploys to your app service
#  ↓
#  App connects to PostgreSQL + Redis via Railway internal networking