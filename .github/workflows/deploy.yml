name: CI/CD → Railway

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: blog_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        run: |
          chmod +x mvnw
          ./mvnw test
        env:
          # Postgres
          DATABASE_URL: jdbc:postgresql://localhost:5432/blog_test
          PGUSER: postgres
          PGPASSWORD: postgres
          # Redis
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_PASSWORD: ""
          # Mocked — tests should use @MockBean for these
          MAIL_USERNAME: test@test.com
          MAIL_PASSWORD: test
          AI_KEY: test-key
          CLOUDINARY_API_KEY: test-key
          CLOUDINARY_SECRET: test-secret
          CACHE_TTL_SECONDS: 60
          SECRET_KEY: test-secret-key-that-is-long-enough-for-hs256-algorithm
            # ... rest of your vars

  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy
        run: railway up --service ${{ secrets.RAILWAY_SERVICE_NAME }} --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}


## 6. GitHub Secrets

#In your GitHub repo → **Settings → Secrets and variables → Actions**, add:
#
#  | Secret | Where to get it |
#  |---|---|
#  | `RAILWAY_TOKEN` | Railway Dashboard → Account Settings → Tokens |
#  | `RAILWAY_SERVICE_NAME` | The name of your app service on Railway |
#
#---
#
### Flow Summary
#  ```
#  Push to main
#  ↓
#GitHub Actions: build + test
#  ↓ (if tests pass)
#  railway up → builds Docker image → deploys to your app service
#  ↓
#  App connects to PostgreSQL + Redis via Railway internal networking